name: test

on:
    push:
        branches: [main]
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: subosito/flutter-action@v2
              with:
                  channel: stable
                  cache: true
            - name: Install dependencies (example)
              run: |
                  cd example
                  flutter pub get
            - name: Run tests (example)
              run: |
                  cd example
                  flutter test
