name: Publish to pub.dev

on:
    push:
        tags:
            - "[0-9]+.[0-9]+.[0-9]+*" # Matches tags like 2.7.0, 2.7.0+1, etc.

jobs:
    publish:
        permissions:
            id-token: write # Required for OIDC authentication
        uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
